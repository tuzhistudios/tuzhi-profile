<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuZhi Gamerz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:     #0e0e10;
      --card:   #1a1a1e;
      --card2:  #222228;
      --card3:  #2a2a32;
      --border: rgba(255,255,255,0.06);
      --border2:rgba(255,255,255,0.10);
      --txt1:   #f2f3f5;
      --txt2:   #949ba4;
      --txt3:   #6d6f78;
      --accent: #5865f2;
      --r:      16px;
      --r2:     12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: clamp(16px,5vw,40px) clamp(10px,4vw,20px) 80px;
      overflow-x: hidden;
    }

    /* Subtle noise */
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; z-index:0; opacity:.5;
    }

    /* Ambient glow */
    .amb {
      position:fixed; pointer-events:none; z-index:0;
      border-radius:50%; filter:blur(90px); opacity:0;
      transition: opacity 1.5s ease;
    }
    .amb.show { opacity:1; }
    #a1 { width:500px;height:350px;top:-100px;left:-120px; background:radial-gradient(ellipse,rgba(88,101,242,0.07) 0%,transparent 70%); }
    #a2 { width:400px;height:300px;bottom:-50px;right:-100px; background:radial-gradient(ellipse,rgba(235,80,120,0.05) 0%,transparent 70%); }

    /* ── PARTICLES ── */
    #particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .star { position:absolute; border-radius:50%; background:#fff; opacity:0; animation:tw var(--d,3s) var(--e,0s) infinite ease-in-out; }
    @keyframes tw { 0%,100%{opacity:0;} 50%{opacity:var(--b,.25);} }

    /* ── CARD ── */
    .profile-card {
      position:relative; z-index:1;
      width:100%; max-width:min(440px,100%);
      background: var(--card);
      border-radius: var(--r);
      border: 1px solid var(--border);
      overflow: visible;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 24px 80px rgba(0,0,0,0.65),
        0 4px 16px rgba(0,0,0,0.4);
      opacity:0;
      transform: translateY(30px) scale(0.97);
    }
    .profile-card.ready {
      animation: cardIn 0.72s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes cardIn {
      to { opacity:1; transform:translateY(0) scale(1); }
    }

    /* ── BANNER ── */
    .banner {
      width:100%;
      height: clamp(100px,27vw,140px);
      border-radius: var(--r) var(--r) 0 0;
      overflow: hidden;
      position:relative;
      background: #111;
    }
    .banner img {
      width:100%; height:100%; object-fit:cover; display:block;
      transform: scale(1.05);
      transition: transform 9s ease;
    }
    .banner.loaded img { transform: scale(1); }
    .banner::after {
      content:'';
      position:absolute; inset:0;
      background: linear-gradient(to bottom, transparent 55%, rgba(0,0,0,0.3) 100%);
      pointer-events:none;
    }

    /* ── AVATAR ROW ── */
    .avatar-row {
      padding: 0 clamp(14px,4vw,20px);
      margin-top: clamp(-36px,-9vw,-42px);
      display: flex;
      align-items: flex-end;
      gap: clamp(10px,3vw,14px);
    }

    .av-outer {
      position:relative;
      flex-shrink:0;
      z-index: 2;
      overflow: visible;
      margin-bottom: 12px;
    }

    .av-wrap {
      position: relative;
      width: 90px; height: 90px;
      overflow: visible;
    }

    .av-circle {
      width:100%; height:100%;
      border-radius: 50%;
      border: 4px solid var(--card);
      background: var(--card2);
      overflow: hidden;
      opacity:0;
      transform: scale(0.55);
    }
    .av-circle.pop {
      animation: avPop 0.6s 0.12s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes avPop { to { opacity:1; transform:scale(1); } }
    .av-circle img { width:100%; height:100%; object-fit:cover; display:block; }

    /* Deco */
    .deco {
      position:absolute;
      width:150px; height:150px;
      top:-30px; left:-30px;
      pointer-events:none; object-fit:contain;
    }
    .deco-bot { z-index:-1; }
    .deco-top {
      z-index:3;
      -webkit-mask: radial-gradient(circle 45px at 75px 75px, transparent 44px, black 45px);
              mask: radial-gradient(circle 45px at 75px 75px, transparent 44px, black 45px);
    }
    #decoCanvas {
      position:absolute; top:-30px; left:-30px;
      width:150px; height:150px;
      pointer-events:none; z-index:3;
    }

    /* Status dot */
    .status-dot {
      position:absolute; bottom:-2px; right:-2px; z-index:4;
      width:20px; height:20px; border-radius:50%;
      background:var(--card); border:3px solid var(--card);
      display:flex; align-items:center; justify-content:center;
    }
    .status-dot svg { display:block; }

    /* ── STATUS BUBBLE ── */
    .status-bubble {
      flex:1; min-width:0;
      background: var(--card2);
      border:1px solid var(--border);
      border-radius: 11px;
      padding: 9px 13px;
      margin-bottom: 12px;
      margin-left: 6px;
      font-size: clamp(11px,3vw,12.5px);
      color: var(--txt2);
      line-height:1.5;
      word-break:break-word;
      align-self:center;
      opacity:0; transform:translateX(14px);
    }
    .status-bubble.slide {
      animation: slideIn 0.5s 0.28s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes slideIn { to { opacity:1; transform:translateX(0); } }

    /* ── BODY ── */
    .profile-body {
      padding: clamp(10px,3vw,14px) clamp(14px,4vw,20px) clamp(16px,4vw,20px);
    }

    .display-name {
      font-size: clamp(18px,5.2vw,23px);
      font-weight: 800; color:var(--txt1);
      letter-spacing: -0.3px; line-height:1.2;
      opacity:0; transform:translateY(8px);
    }
    .display-name.up { animation: fadeUp 0.4s 0.34s ease forwards; }

    .meta-row {
      display:flex; align-items:center; gap:6px; flex-wrap:wrap;
      margin:3px 0 14px;
      font-size: clamp(11px,3vw,12.5px);
      color:var(--txt2);
      opacity:0; transform:translateY(8px);
    }
    .meta-row.up { animation: fadeUp 0.4s 0.41s ease forwards; }
    .meta-sep { color:var(--txt3); }

    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { to { opacity:1; } }

    /* Profile color bar */
    .color-bar {
      height:3px; border-radius:99px; margin-bottom:14px;
      opacity:0; animation: fadeIn 0.4s 0.5s ease forwards;
    }

    /* ── BADGES ── */
    .badges-wrap {
      display:flex; flex-wrap:wrap; gap:6px;
      margin-bottom:13px;
    }
    .badge-item {
      width:34px; height:34px; border-radius:8px;
      background:var(--card2); border:1px solid var(--border);
      overflow:hidden; cursor:pointer;
      display:flex; align-items:center; justify-content:center; padding:4px;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), border-color 0.18s, box-shadow 0.18s;
      opacity:0; transform:scale(0.65);
    }
    .badge-item.pop { animation: badgePop 0.32s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes badgePop { to { opacity:1; transform:scale(1); } }
    .badge-item img { width:100%; height:100%; object-fit:contain; display:block; }
    .badge-item:hover {
      transform:translateY(-3px) scale(1.13);
      border-color:rgba(255,255,255,0.18);
      box-shadow:0 6px 18px rgba(0,0,0,0.45);
    }
    .badge-item:active { transform:scale(0.88); }

    /* ── ABOUT ── */
    .about-box {
      background:var(--card2); border:1px solid var(--border);
      border-radius:var(--r2);
      padding:12px 14px; margin-bottom:12px;
      opacity:0; transform:translateY(8px);
    }
    .about-box.up { animation: fadeUp 0.4s 0.52s ease forwards; }
    .about-label {
      font-size:10px; font-weight:700; color:var(--txt3);
      text-transform:uppercase; letter-spacing:1.3px; margin-bottom:6px;
    }
    .about-text {
      font-size: clamp(12.5px,3.4vw,13.5px);
      color:var(--txt1); line-height:1.55; white-space:pre-wrap; font-weight:400;
    }

    /* ── BUTTONS ── */
    .buttons-wrap { display:flex; flex-direction:column; gap:8px; }

    .profile-btn {
      display:grid;
      grid-template-columns: 34px 1fr 26px;
      align-items:center;
      padding: 12px 14px;
      border-radius: 10px;
      text-decoration:none;
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--txt1);
      cursor:pointer;
      position:relative; overflow:hidden;
      transition:
        background 0.18s ease,
        border-color 0.18s ease,
        transform 0.15s cubic-bezier(0.34,1.56,0.64,1),
        box-shadow 0.18s ease;
      opacity:0; transform:translateY(10px);
      -webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    .profile-btn.up { animation: fadeUp 0.38s ease forwards; }

    /* hover shimmer sweep */
    .profile-btn::before {
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      transform:translateX(-120%);
      transition:transform 0.45s ease;
      pointer-events:none;
    }
    .profile-btn:hover::before { transform:translateX(120%); }

    .profile-btn:hover {
      background:var(--card3);
      border-color:var(--border2);
      transform:translateY(-1px);
      box-shadow:0 4px 20px rgba(0,0,0,0.35);
    }
    .profile-btn:active {
      transform:scale(0.972);
      background:var(--card2);
    }

    /* ripple */
    .rpl-layer { position:absolute; inset:0; overflow:hidden; border-radius:inherit; pointer-events:none; }
    .rpl {
      position:absolute; border-radius:50%;
      background:rgba(255,255,255,0.1);
      transform:scale(0);
      animation:rplAnim 0.5s ease-out forwards;
      pointer-events:none;
    }
    @keyframes rplAnim { to { transform:scale(4.5); opacity:0; } }

    .btn-icon { font-size:14.5px; color:var(--txt2); justify-self:start; transition:color 0.18s; }
    .profile-btn:hover .btn-icon { color:var(--txt1); }
    .btn-name { text-align:center; font-size:13px; font-weight:600; color:var(--txt1); }
    .btn-arrow {
      justify-self:end; font-size:12px; color:var(--txt3);
      transition:color 0.18s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    .profile-btn:hover .btn-arrow { color:var(--txt2); transform:translate(3px,-3px); }

    /* click flash ring */
    @keyframes flashRing {
      0%   { box-shadow:0 0 0 0 rgba(255,255,255,0.22); }
      100% { box-shadow:0 0 0 14px rgba(255,255,255,0); }
    }
    .flash { animation:flashRing 0.38s ease-out forwards !important; }

    /* ── FOOTER ── */
    .profile-footer {
      border-top:1px solid var(--border);
      padding:11px 20px; text-align:center;
      font-size:11px; color:var(--txt3);
      border-radius:0 0 var(--r) var(--r);
      font-weight:500; letter-spacing:0.02em;
      opacity:0; animation: fadeIn 0.4s 0.9s ease forwards;
    }

    /* ── TOOLTIP ── */
    .badge-tooltip {
      position:fixed; top:14px; left:50%;
      transform:translateX(-50%) translateY(-55px);
      background:var(--card2); border:1px solid var(--border2);
      border-radius:11px; padding:9px 15px;
      display:flex; align-items:center; gap:9px;
      box-shadow:0 10px 40px rgba(0,0,0,0.6);
      z-index:9999; opacity:0;
      transition:all 0.26s cubic-bezier(0.22,1,0.36,1);
      pointer-events:none; max-width:calc(100vw - 32px);
    }
    .badge-tooltip.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .badge-tooltip img { width:26px; height:26px; object-fit:contain; flex-shrink:0; }
    .badge-tooltip span { font-size:13px; font-weight:600; color:var(--txt1); white-space:nowrap; }

    /* ── SKELETON ── */
    .sk {
      background:linear-gradient(90deg,var(--card2) 25%,rgba(255,255,255,0.03) 50%,var(--card2) 75%);
      background-size:200% 100%; animation:sk 1.4s infinite linear;
    }
    @keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<div id="particles"></div>
<div class="amb" id="a1"></div>
<div class="amb" id="a2"></div>

<div class="badge-tooltip" id="tt">
  <img id="ttImg" src="" alt=""/>
  <span id="ttName"></span>
</div>

<!-- Skeleton -->
<div class="profile-card" id="card">
  <div class="banner"><div class="sk" style="width:100%;height:130px;border-radius:0;"></div></div>
  <div style="padding:0 18px;margin-top:-40px;display:flex;align-items:flex-end;gap:12px;">
    <div class="sk" style="width:90px;height:90px;border-radius:50%;flex-shrink:0;margin-bottom:12px;"></div>
    <div class="sk" style="flex:1;height:44px;border-radius:10px;margin-bottom:12px;margin-left:6px;"></div>
  </div>
  <div style="padding:10px 18px 20px;">
    <div class="sk" style="width:50%;height:22px;margin-bottom:8px;border-radius:6px;"></div>
    <div class="sk" style="width:34%;height:12px;margin-bottom:16px;border-radius:6px;"></div>
    <div style="display:flex;gap:6px;margin-bottom:13px;">
      <div class="sk" style="width:34px;height:34px;border-radius:8px;"></div>
      <div class="sk" style="width:34px;height:34px;border-radius:8px;"></div>
      <div class="sk" style="width:34px;height:34px;border-radius:8px;"></div>
      <div class="sk" style="width:34px;height:34px;border-radius:8px;"></div>
    </div>
    <div class="sk" style="height:54px;border-radius:10px;margin-bottom:10px;"></div>
    <div class="sk" style="height:42px;border-radius:10px;margin-bottom:8px;"></div>
    <div class="sk" style="height:42px;border-radius:10px;margin-bottom:8px;"></div>
    <div class="sk" style="height:42px;border-radius:10px;"></div>
  </div>
</div>

<script>
/* STARS */
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<85;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()<.18?2.5:1.5;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--d:${2.5+Math.random()*5}s;--e:${Math.random()*7}s;--b:${.12+Math.random()*.35};`;
    c.appendChild(s);
  }
  setTimeout(()=>{ document.getElementById('a1').classList.add('show'); document.getElementById('a2').classList.add('show'); },400);
})();

/* STATUS SVG */
function statusSVG(type){
  const BG='#1a1a1e';
  const m={
    online:   `<circle cx="8" cy="8" r="8" fill="#3ba55d"/>`,
    dnd:      `<circle cx="8" cy="8" r="8" fill="#ed4245"/><rect x="3" y="6.4" width="10" height="3.2" rx="1.6" fill="#fff"/>`,
    idle:     `<circle cx="8" cy="8" r="8" fill="#faa61a"/><circle cx="5" cy="4.5" r="7" fill="${BG}"/>`,
    offline:  `<circle cx="8" cy="8" r="8" fill="#747f8d"/><circle cx="8" cy="8" r="3.5" fill="${BG}"/>`,
    streaming:`<circle cx="8" cy="8" r="8" fill="#593695"/><polygon points="5.5,4.5 5.5,11.5 12,8" fill="#fff"/>`,
  };
  return `<div class="status-dot"><svg width="16" height="16" viewBox="0 0 16 16">${m[type]||m.offline}</svg></div>`;
}

/* DECO */
const BUILTINS=['dark-soul', 'ocean-frame', 'flower-wreath','matrix-frame'];
function buildDeco(d){
  if(!d||!d.file) return {bot:'',top:'',canvas:false,active:false};
  const name=d.file.trim();
  if(BUILTINS.includes(name)){
    return {bot:'',top:`<canvas id="decoCanvas" width="150" height="150"></canvas>`,canvas:name,active:true};
  }
  const src='deco/'+name;
  const lyr=(d.layer||'frame').toLowerCase();
  const el=cls=>`<img class="deco ${cls}" src="${src}" alt="" onerror="this.style.display='none'"/>`;
  if(lyr==='frame') return {bot:el('deco-bot'),top:el('deco-top'),canvas:false,active:true};
  if(lyr==='under') return {bot:el('deco-bot'),top:'',canvas:false,active:true};
  return {bot:'',top:el('deco-top'),canvas:false,active:true};
}
function startDecoCanvas(name){
  const old=document.getElementById('decoScript'); if(old)old.remove();
  const s=document.createElement('script'); s.id='decoScript';
  s.src='deco/'+name+'.js?t='+Date.now(); document.body.appendChild(s);
}

/* RIPPLE */
function ripple(btn,e){
  const r=btn.getBoundingClientRect();
  const x=e.clientX-r.left, y=e.clientY-r.top;
  const sz=Math.max(r.width,r.height)*1.3;
  let layer=btn.querySelector('.rpl-layer');
  if(!layer){layer=document.createElement('div');layer.className='rpl-layer';btn.appendChild(layer);}
  const c=document.createElement('div'); c.className='rpl';
  c.style.cssText=`width:${sz}px;height:${sz}px;left:${x-sz/2}px;top:${y-sz/2}px;`;
  layer.appendChild(c);
  c.addEventListener('animationend',()=>c.remove());
}

/* RENDER */
function render(p){
  if(window._decoRaf) cancelAnimationFrame(window._decoRaf);
  const card=document.getElementById('card');
  const st=(p.status?.type||'dnd').toLowerCase();
  const deco=buildDeco(p.decoration);
  const hasColor=p.color&&(p.color.a||p.color.b);

  card.innerHTML=`
    <div class="banner" id="bnr">
      <img src="${p.banner}" alt=""
        onload="document.getElementById('bnr').classList.add('loaded')"
        onerror="this.style.display='none'"/>
    </div>

    <div class="avatar-row">
      <div class="av-outer">
        ${deco.bot}
        <div class="av-wrap">
          <div class="av-circle" id="avC">
            <img src="${p.avatar}" alt="" onerror="this.style.display='none'"/>
          </div>
          ${deco.top}
          ${statusSVG(st)}
        </div>
      </div>
      <div class="status-bubble" id="stB">${xH(p.status?.text||'')}</div>
    </div>

    <div class="profile-body">
      <div class="display-name" id="dN">${p.name}</div>
      <div class="meta-row" id="mR">
        <span>${xH(p.username)}</span>
        <span class="meta-sep">•</span>
        <span>${xH(p.nickname)}</span>
      </div>

      ${hasColor?`<div class="color-bar" style="background:linear-gradient(90deg,${p.color.a},${p.color.b});"></div>`:''}

      ${p.badges?.length?`
      <div class="badges-wrap">
        ${p.badges.map((b,i)=>`
          <div class="badge-item" data-n="${xQ(b.name)}" data-i="${xQ(b.image)}" data-c="${xQ(b.color||'#5865f2')}">
            <img src="${b.image}" alt="${xQ(b.name)}" onerror="this.style.opacity='.2'"/>
          </div>`).join('')}
      </div>`:''}

      <div class="about-box" id="aB">
        <div class="about-label">About Me</div>
        <div class="about-text">${xH(p.about||'')}</div>
      </div>

      ${p.buttons?.length?`
      <div class="buttons-wrap">
        ${p.buttons.map(b=>`
          <a href="${b.link}" target="_blank" rel="noopener" class="profile-btn">
            <i class="btn-icon ${b.icon||'fas fa-link'}"></i>
            <span class="btn-name">${xH(b.name)}</span>
            <span class="btn-arrow">↗</span>
          </a>`).join('')}
      </div>`:''}
    </div>

    ${p.footer?`<div class="profile-footer">${xH(p.footer)}</div>`:''}
  `;

  /* — staggered reveal — */
  requestAnimationFrame(()=>{
    card.classList.add('ready');

    const q=(id,cls,delay)=>{ const el=document.getElementById(id); if(el) setTimeout(()=>el.classList.add(cls),delay); };
    q('avC','pop',130);
    q('stB','slide',270);
    q('dN','up',330);
    q('mR','up',390);
    q('aB','up',500);

    document.querySelectorAll('.badge-item').forEach((b,i)=>
      setTimeout(()=>b.classList.add('pop'), 440+i*55));

    document.querySelectorAll('.profile-btn').forEach((b,i)=>
      setTimeout(()=>{ b.classList.add('up'); b.style.animationDelay='0s'; }, 570+i*70));
  });

  /* badge clicks */
  document.querySelectorAll('.badge-item').forEach(el=>{
    el.addEventListener('click',()=>tip(el.dataset.n,el.dataset.i,el.dataset.c));
  });

  /* button interactions */
  document.querySelectorAll('.profile-btn').forEach(btn=>{
    btn.addEventListener('click',function(e){
      ripple(this,e);
      this.classList.remove('flash'); void this.offsetWidth; this.classList.add('flash');
      this.addEventListener('animationend',()=>this.classList.remove('flash'),{once:true});
    });
  });

  if(deco.canvas) startDecoCanvas(deco.canvas);
}
